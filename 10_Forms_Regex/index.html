<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="bootstrap/bootstrap.min.css">
    <title>Regex forms</title>
</head>

<body>
    <h1 class="text-center mt-4">Валідація форм</h1>
        <form class="w-25 m-auto" onsubmit="loginSubmit(event)">
            <div>
                <label for="email" class="form-label mt-4"
                    >Електронна пошта</label
                >
                <input
                    type="text"
                    class="form-control"
                    id="email"
                    name="email"
                    placeholder="example@mail.com"
                    oninput="handleEmailInput(event)"
                />
                <small id="emailError" class="form-text text-danger"></small>
            </div>

            <div>
                <label for="password" class="form-label mt-4"
                    >Пароль</label
                >
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    oninput="handlePasswordInput(event)"
                />
                <small id="passwordError" class="form-text text-danger"></small>
            </div>

            <div>
                <input id="btnSubmit" type="submit" value="Увійти" class="btn btn-secondary w-100 mt-4">
            </div>
        </form>

    </nav>
    <script src="script.js"></script>
    <script src="bootstrap/bootstrap.bundle.min.js"></script>
</body>

</html>
