<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css">
        <title>Forms</title>
    </head>
    <body>
        <h2 style="text-align: center;">Форма</h2>
        <div style="display: flex; justify-content: center;">
            <form onsubmit="formSubmit(event)" action="/" method="get">
                <div class="input-group">
                    <label for="name">Ваше ім'я</label>
                    <!-- required - робить поле обов'язковим -->
                    <input id="name" name="name" type="text" required />
                </div>
                <div class="input-group">
                    <label for="email">Пошта</label>
                    <input id="email" name="email" type="email" autocomplete="email" />
                </div>
                <div class="input-group">
                    <label for="password">Пароль</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" />
                </div>
                <div class="input-group">
                    <label for="phone">Телефон</label>
                    <input id="phone" name="phone" type="tel" />
                </div>
                <div class="input-group">
                    <label for="search">Пошук</label>
                    <input id="search" name="search" type="search" />
                </div>
                <div class="input-group">
                    <label for="url">Посилання</label>
                    <input id="url" name="url" type="url" />
                </div>
                <div class="input-group">
                    <label for="age">Вік</label>
                    <input id="age" name="age" type="number" min="0" max="100" />
                </div>
                <div>
                    <label for="rememberMe">Запам'ятати мене</label>
                    <input id="rememberMe" name="rememberMe" type="checkbox" />
                </div>
                <div class="input-group">
                    <label>Стать</label>
                    <div>
                        <!-- Щоб radio button об'єднати у групу потрібно їм дати однакове ім'я -->
                        <input value="male" id="male" name="gender" type="radio" checked />
                        <label for="male">Чоловік</label>
                        <br>
                        <input value="female" id="female" name="gender" type="radio" />
                        <label for="female">Жінка</label>
                    </div>
                </div>
                <div class="input-group">
                    <label for="color">Колір</label>
                    <input id="color" name="color" type="color" />
                </div>
                <div class="input-group">
                    <label for="time">Час</label>
                    <input id="time" name="time" type="time" />
                </div>
                <div class="input-group">
                    <label for="date">Дата</label>
                    <input id="date" name="date" type="date" />
                </div>
                <div class="input-group">
                    <label for="week">Тиждень</label>
                    <input id="week" name="week" type="week" />
                </div>
                <div class="input-group">
                    <label for="month">Місяць</label>
                    <input id="month" name="month" type="month" />
                </div>
                <div class="input-group">
                    <label for="datetime">Дата та час</label>
                    <input id="datetime" name="datetime" type="datetime-local" />
                </div>
                <div class="input-group">
                    <label for="file">Завантажити файл</label>
                    <input id="file" name="file" type="file" accept="image/*" oninput="selectFile(event)" />
                </div>
                <div class="input-group">
                    <label for="files">Завантажити файли</label>
                    <input id="files" name="files" type="file" accept="image/*" oninput="selectFiles(event)" multiple />
                </div>
                <div id="previewImage">
                    
                </div>
                <div style="text-align: center; margin-top: 16px;">
                    <input class="submit-btn" type="submit" value="Відправити форму">
                </div>
                <div style="text-align: center; margin-top: 16px;">
                    <!-- reset - кнопка як очищає всі input -->
                    <input class="submit-btn" type="reset" value="Очистити">
                </div>
            </form>
        </div>
        <script src="script.js"></script>
    </body>
</html>
