<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Select</title>
    </head>
    <body>
        <div style="display: flex; justify-content: center;">
            <form onsubmit="createFigure(event)">
                <div class="input-group">
                    <label for="width">Ширина</label>
                    <input id="width" name="width" min="100" value="100" type="number">
                    <label for="height">Висота</label>
                    <input id="height" name="height" min="100" value="100" type="number">
                    <label for="color">Колір</label>
                    <input id="color" name="color" type="color" style="width: 100%;">
                    <label for="figure">Фігура</label>
                    <select id="figure" name="figure">
                        <option value="rect">Прямокутник</option>
                        <option value="circle">Коло</option>
                        <option value="triangle">Трикутник</option>
                    </select>
                </div>
                <div>
                    <input type="range" style="width: 100%;" min="0" max="100" step="50" value="0">
                </div>
                <div>
                    <input value="Створити" class="submit-btn" type="submit"/>
                </div>
            </form>
        </div>
        <div id="figures">
            
        </div>
        <script src="script.js"></script>
    </body>
</html>
